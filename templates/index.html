<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đọc Truyện</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-family: Arial;
        }

        input {
            width: 60%;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            background: #00ffcc;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>Dán link Gallery vào đây</h2>
    <form action="/read" method="POST">
        <input type="text" name="url" placeholder="Nhập link..." required>
        <br>
        <button type="submit">Đọc Ngay</button>
    </form>
</body>

</html>
