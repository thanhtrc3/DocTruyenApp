<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Chế Độ Đọc</title>
    <style>
        body {
            margin: 0;
            background: #000;
            text-align: center;
        }

        .nav {
            padding: 15px;
            background: #111;
            text-align: left;
        }

        .nav a {
            color: #00ffcc;
            text-decoration: none;
            font-size: 18px;
            font-family: Arial;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            min-height: 800px;
            background: #222;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper img {
            width: 100%;
            display: none;
            /* Ẩn cho đến khi load xong */
            margin: 0;
        }

        .loading-text {
            color: #888;
            font-family: Arial;
            font-size: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="nav">
        <a href="/">← Nhập link khác</a>
    </div>
    <div class="container">
        {% if page_links %}
        {% for page_url in page_links %}
        <div class="image-wrapper" data-page-url="{{ page_url }}">
            <div class="loading-text">Đang đợi tải...</div>
            <img src="" alt="comic page">
        </div>
        {% endfor %}
        {% else %}
        <h3 style="color: white; margin-top: 50px;">Không tìm thấy ảnh. Link có thể bị sai.</h3>
        {% endif %}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const imageWrappers = Array.from(document.querySelectorAll('.image-wrapper'));
            const maxConcurrent = 10; // Tải 5 ảnh cùng lúc
            let currentIndex = 0;

            function loadNextImage() {
                if (currentIndex >= imageWrappers.length) return;

                const wrapper = imageWrappers[currentIndex];
                currentIndex++; // Tăng chỉ số ngay lập tức để luồng khác không lấy trùng

                const pageUrl = wrapper.getAttribute('data-page-url');
                const img = wrapper.querySelector('img');
                const loadingText = wrapper.querySelector('.loading-text');

                loadingText.innerText = 'Đang tải...';
                loadingText.style.display = 'block';

                // Gọi API lấy link ảnh gốc
                fetch(`/api/get_image?url=${encodeURIComponent(pageUrl)}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.image_url) {
                            // Gắn sự kiện khi ảnh tải xong hoặc lỗi
                            img.onload = function () {
                                this.style.display = 'block';
                                this.previousElementSibling.style.display = 'none';
                                this.parentElement.style.minHeight = 'auto';
                                loadNextImage(); // Tiếp tục tải ảnh tiếp theo
                            };
                            img.onerror = function () {
                                loadingText.innerText = "Lỗi hiển thị ảnh";
                                loadNextImage();
                            };

                            // Bắt đầu tải ảnh
                            img.src = data.image_url;
                        } else {
                            loadingText.innerText = "Lỗi tải ảnh";
                            loadNextImage();
                        }
                    })
                    .catch(err => {
                        loadingText.innerText = "Lỗi kết nối";
                        loadNextImage();
                    });
            }

            // Bắt đầu tải các ảnh song song
            for (let i = 0; i < Math.min(maxConcurrent, imageWrappers.length); i++) {
                loadNextImage();
            }
        });
    </script>
</body>

</html>
